<svg width="700" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>

    <linearGradient id="barTS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3178c6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barJS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0db4f"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <linearGradient id="barHTML" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e34c26"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="barCSS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#264de4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="barOther" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title { font-family: 'Segoe UI', 'Fira Code', monospace; font-weight: 700; fill: #e6edf3; }
      .label { font-family: 'Segoe UI', 'Fira Code', monospace; font-weight: 600; fill: #c9d1d9; font-size: 15px; }
      .pct   { font-family: 'Segoe UI', 'Fira Code', monospace; font-weight: 700; fill: #ffffff; font-size: 14px; }
      .track { fill: #1c2333; }
      @keyframes grow {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
      .bar { transform-origin: left; animation: grow 1.2s ease-out forwards; }
    </style>
  </defs>

  <rect x="0" y="0" width="700" height="320" rx="18" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="699" height="319" rx="17.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="32" y="44" class="title" font-size="20">📊 Most Used Languages</text>
  <line x1="32" y1="58" x2="668" y2="58" stroke="#30363d" stroke-width="1"/>

  <!-- TypeScript -->
  <text x="32" y="90" class="label">TypeScript</text>
  <text x="668" y="90" class="pct" text-anchor="end">42%</text>
  <rect x="32" y="98" width="636" height="14" rx="7" class="track"/>
  <rect x="32" y="98" height="14" rx="7" fill="url(#barTS)" filter="url(#softShadow)">
    <animate attributeName="width" from="0" to="267" dur="1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- JavaScript -->
  <text x="32" y="138" class="label">JavaScript</text>
  <text x="668" y="138" class="pct" text-anchor="end">24%</text>
  <rect x="32" y="146" width="636" height="14" rx="7" class="track"/>
  <rect x="32" y="146" height="14" rx="7" fill="url(#barJS)" filter="url(#softShadow)">
    <animate attributeName="width" from="0" to="153" dur="1s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- HTML -->
  <text x="32" y="186" class="label">HTML</text>
  <text x="668" y="186" class="pct" text-anchor="end">16%</text>
  <rect x="32" y="194" width="636" height="14" rx="7" class="track"/>
  <rect x="32" y="194" height="14" rx="7" fill="url(#barHTML)" filter="url(#softShadow)">
    <animate attributeName="width" from="0" to="102" dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- CSS -->
  <text x="32" y="234" class="label">CSS</text>
  <text x="668" y="234" class="pct" text-anchor="end">12%</text>
  <rect x="32" y="242" width="636" height="14" rx="7" class="track"/>
  <rect x="32" y="242" height="14" rx="7" fill="url(#barCSS)" filter="url(#softShadow)">
    <animate attributeName="width" from="0" to="76" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- Other -->
  <text x="32" y="282" class="label">Other</text>
  <text x="668" y="282" class="pct" text-anchor="end">6%</text>
  <rect x="32" y="290" width="636" height="14" rx="7" class="track"/>
  <rect x="32" y="290" height="14" rx="7" fill="url(#barOther)" filter="url(#softShadow)">
    <animate attributeName="width" from="0" to="38" dur="1s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>
</svg>
